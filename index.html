\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKAS Air Quality Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-dark);
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #334155;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        span.brand {
            color: var(--accent);
        }

        .btn-location {
            background-color: var(--success);
            color: #0f172a;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-location:hover {
            background-color: #059669;
        }

        .main-container {
            display: flex;
            flex: 1;
            position: relative;
            height: calc(100vh - 65px);
        }

        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        .sidebar {
            width: 360px;
            background-color: var(--card-dark);
            border-left: 1px solid #334155;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            z-index: 10;
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
        }

        .info-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.25rem;
        }

        .station-display {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }

        .aqi-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
        }

        .aqi-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }

        .aqi-status {
            font-size: 1rem;
            font-weight: 600;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            text-align: right;
            max-width: 150px;
            word-wrap: break-word;
        }

        .pollutant-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .pollutant-badge {
            background: #0f172a;
            padding: 0.75rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .pollutant-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .pollutant-val {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: auto; height: 45%; border-left: none; border-top: 1px solid #334155; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="brand">AKAS</span> Network Monitor</h1>
        <button class="btn-location" onclick="locateUserDevice()">📍 Track My Location</button>
    </header>

    <div class="main-container">
        <div id="map"></div>

        <div class="sidebar">
            <div class="info-card">
                <h3 style="margin-top:0; color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; letter-spacing: 0.05em;">Current Location Node</h3>
                <div id="station-text" class="station-display">Click anywhere on Earth to start</div>
            </div>

            <div class="info-card">
                <h3 style="margin-top:0; color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; letter-spacing: 0.05em;">Air Quality Index (AQI)</h3>
                <div class="aqi-display">
                    <div class="aqi-value" id="aqi-num">--</div>
                    <div class="aqi-status" id="aqi-text" style="background: rgba(255,255,255,0.05);">No Data</div>
                </div>
            </div>

            <div class="info-card">
                <h3 style="margin-top:0; color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; margin-bottom:1rem; letter-spacing: 0.05em;">Sensor Telemetry Arrays</h3>
                <div class="pollutant-grid">
                    <div class="pollutant-badge"><div class="pollutant-name">PM2.5</div><div class="pollutant-val" id="pm25">--</div></div>
                    <div class="pollutant-badge"><div class="pollutant-name">PM10</div><div class="pollutant-val" id="pm10">--</div></div>
                    <div class="pollutant-badge"><div class="pollutant-name">Ozone (O₃)</div><div class="pollutant-val" id="o3">--</div></div>
                    <div class="pollutant-badge"><div class="pollutant-name">Nitrogen (NO₂)</div><div class="pollutant-val" id="no2">--</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Set standard startup bounding frame
        const map = L.map('map', { center: [22.0, 78.0], zoom: 5 });
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(map);

        function getAQIProperties(aqi) {
            if (aqi <= 50) return { text: "Good", color: "#10b981" };
            if (aqi <= 100) return { text: "Moderate", color: "#f59e0b" };
            if (aqi <= 150) return { text: "Sensitive Risks", color: "#f97316" };
            if (aqi <= 200) return { text: "Unhealthy", color: "#ef4444" };
            if (aqi <= 300) return { text: "Very Unhealthy", color: "#a855f7" };
            return { text: "Hazardous", color: "#7f1d1d" };
        }

        let currentMarker = null;

        // Core telemetry data fetching pipeline
        async function fetchEnvironmentalMetrics(lat, lng) {
            if(currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 10);

            document.getElementById('station-text').innerText = "Connecting to air arrays...";

            try {
                const response = await fetch(`https://api.waqi.info/feed/geo:${lat};${lng}/?token=demo`);
                const result = await response.json();

                if (result.status === "ok") {
                    const data = result.data;
                    const aqi = data.aqi;
                    const props = getAQIProperties(aqi);

                    document.getElementById('station-text').innerText = data.city.name;
                    document.getElementById('aqi-num').innerText = aqi;
                    document.getElementById('aqi-num').style.color = props.color;
                    
                    document.getElementById('aqi-text').innerText = props.text;
                    document.getElementById('aqi-text').style.backgroundColor = props.color + '22';
                    document.getElementById('aqi-text').style.color = props.color;

                    document.getElementById('pm25').innerText = data.iaqi.pm25 ? data.iaqi.pm25.v + " µg" : 'N/A';
                    document.getElementById('pm10').innerText = data.iaqi.pm10 ? data.iaqi.pm10.v + " µg" : 'N/A';
                    document.getElementById('o3').innerText = data.iaqi.o3 ? data.iaqi.o3.v + " ppb" : 'N/A';
                    document.getElementById('no2').innerText = data.iaqi.no2 ? data.iaqi.no2.v + " ppb" : 'N/A';
                    
                    currentMarker.bindPopup(`<b>${data.city.name}</b><br>AQI: <b style="color:${props.color}">${aqi}</b>`).openPopup();
                } else {
                    document.getElementById('station-text').innerText = "No monitoring station nearby.";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('station-text').innerText = "Telemetry pipeline lookup error.";
            }
        }

        // Catch manually designated click events
        map.on('click', function(e) {
            fetchEnvironmentalMetrics(e.latlng.lat, e.latlng.lng);
        });

        // Native Browser Geolocation Call
        function locateUserDevice() {
            if (navigator.geolocation) {
                document.getElementById('station-text').innerText = "Requesting device GPS coordinate parameters...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        fetchEnvironmentalMetrics(position.coords.latitude, position.coords.longitude);
                    },
                    (error) => {
                        alert("GPS Telemetry access denied: " + error.message);
                        document.getElementById('station-text').innerText = "GPS access blocked.";
                    }
                );
            } else {
                alert("Your browser environment does not support location scanning.");
            }
        }
    </script>
</body>
</html>
